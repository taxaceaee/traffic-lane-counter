    <div id="page-content-events" class="tab-content hidden space-y-6">
        <div class="flex items-center gap-4 flex-wrap">
            <div class="flex items-center gap-3">
                <label class="text-xs font-semibold uppercase text-slate-500">Camera</label>
                <select id="events-cam-select" onchange="loadEventsData()" class="bg-slate-900 border border-slate-800 rounded-lg px-3 py-2 text-slate-200 text-sm focus:outline-none focus:border-indigo-500">
                    <option value="">— Select camera —</option>
                </select>
            </div>
            <div class="flex items-center gap-1 bg-slate-950 border border-slate-800 rounded-lg p-0.5">
                <button type="button" id="events-tab-lane" onclick="setEventsFeed('lane')" class="px-3 py-1.5 rounded text-xs font-semibold text-white bg-indigo-600">Lane changes</button>
                <button type="button" id="events-tab-cross" onclick="setEventsFeed('cross')" class="px-3 py-1.5 rounded text-xs font-semibold text-slate-400 hover:text-white">Track counts</button>
            </div>
            <button onclick="loadEventsData()" class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold bg-indigo-600 hover:bg-indigo-500 text-white transition-all">
                <i data-lucide="refresh-cw" class="h-4 w-4"></i> Refresh
            </button>
            <button onclick="exportEventsCSV()" class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold border border-slate-800 bg-slate-900 hover:border-slate-700 text-slate-300 ml-auto">
                <i data-lucide="download" class="h-3.5 w-3.5"></i> Export CSV
            </button>
        </div>

        <div class="bg-slate-900/40 border border-slate-800 rounded-xl p-6">
            <div class="flex justify-between items-center mb-5">
                <div>
                    <h3 class="text-base font-bold text-white" id="events-feed-title">Lane-change Event Log</h3>
                    <p class="text-xs text-slate-500 mt-0.5" id="events-feed-sub">Stable lane transitions for tracked vehicles.</p>
                </div>
                <span class="text-xs text-slate-500" id="events-count"></span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left text-slate-400">
                    <thead class="text-xs uppercase bg-slate-950/60 text-slate-500 border-b border-slate-800">
                        <tr id="events-table-head"></tr>
                    </thead>
                    <tbody id="events-logs-tbody">
                        <tr><td colspan="8" class="px-4 py-8 text-center text-slate-600 text-sm">Select a camera to view events</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
