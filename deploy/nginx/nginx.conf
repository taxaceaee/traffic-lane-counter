# TrafficFlow Nginx reverse proxy
#
# Routing:
#   /              → Streamlit dashboard (port 3000)
#   /api/          → FastAPI REST backend (port 8000)
#   /ws/           → FastAPI WebSocket  (port 8000)
#
# TLS is expected to be terminated at a reverse proxy (e.g., Cloudflare,
# AWS ALB, or a separate nginx instance). This nginx runs in plain HTTP
# behind an internal network.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Security & performance headers ─────────────────────────────────────
    server_tokens off;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws:; font-src 'self' data:;" always;

    # ── Rate limiting zones ────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=mutate:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=ws:10m rate=10r/m;

    # ── Logging ────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main buffer=32k flush=5s;

    # ── Performance tuning ─────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 100;
    client_max_body_size 100m;
    reset_timedout_connection on;
    client_body_timeout 30s;
    client_header_timeout 10s;
    send_timeout 10s;

    # ── Gzip compression ───────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Upstream backends ──────────────────────────────────────────────────
    upstream api_backend {
        server api:8000;
        keepalive 16;
    }

    upstream dashboard_backend {
        server dashboard:3000;
        keepalive 8;
    }

    # ── Main server block ──────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ---------- REST API ----------
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://api_backend/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";

            proxy_read_timeout  60s;
            proxy_send_timeout  60s;
        }

        # ---------- Mutating endpoints (stricter rate limit) ----------
        location ~* ^/api/infer/video$ {
            limit_req zone=mutate burst=5 nodelay;

            proxy_pass         http://api_backend/api/infer/video;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";

            proxy_read_timeout  60s;
            proxy_send_timeout  60s;
        }

        location ~* ^/api/cameras/.+/lanes$ {
            limit_req zone=mutate burst=5 nodelay;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";

            proxy_read_timeout  60s;
            proxy_send_timeout  60s;
        }

        # ---------- Annotated video files (large file downloads) ----------
        location ~* ^/api/jobs/.+/video$ {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";

            proxy_read_timeout  600s;
            proxy_send_timeout  600s;
            proxy_buffering     off;
        }

        # ---------- WebSocket (realtime dashboard feed) ----------
        location /ws/ {
            limit_req zone=ws burst=3 nodelay;

            proxy_pass          http://api_backend/ws/;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade    $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_set_header    Host       $host;
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }

        # ---------- Streamlit dashboard (everything else) ----------
        location / {
            proxy_pass         http://dashboard_backend/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
        }
    }
}
