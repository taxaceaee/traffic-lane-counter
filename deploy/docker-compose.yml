# TrafficFlow full stack (local / single-host)
#
#   docker compose -f deploy/docker-compose.yml up --build
#   docker compose -f deploy/docker-compose.yml --profile gpu up --build
#
# Each service can also be built/deployed alone from services/*/Dockerfile.

name: trafficflow

services:

  redis:
    image: redis:7-alpine
    container_name: trafficflow_redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: trafficflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trafficflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trafficflow_secret}
      POSTGRES_DB: ${POSTGRES_DB:-trafficflow}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - trafficflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trafficflow} -d ${POSTGRES_DB:-trafficflow}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Backend API ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: services/backend/Dockerfile
    container_name: trafficflow_backend
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      JWT_SECRET: ${JWT_SECRET:-}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-admin}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      DATABASE_URL: postgresql://${POSTGRES_USER:-trafficflow}:${POSTGRES_PASSWORD:-trafficflow_secret}@postgres:5432/${POSTGRES_DB:-trafficflow}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_REQUIRED: "true"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      SERVE_FRONTEND: ${SERVE_FRONTEND:-false}
      OUTPUT_DIR: /app/outputs
      STORAGE_ROOT: /app/storage
      CAMERAS_DIR: /app/configs/cameras
      MAX_WORKERS: ${MAX_WORKERS:-2}
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    volumes:
      - ../configs:/app/configs:ro
      - trafficflow_outputs:/app/outputs
      - trafficflow_storage:/app/storage
      - trafficflow_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/readyz')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Model worker (CPU) ─────────────────────────────────────────────────────
  model:
    build:
      context: ..
      dockerfile: services/model/Dockerfile
      args:
        TORCH_INDEX_URL: https://download.pytorch.org/whl/cpu
    container_name: trafficflow_model
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-trafficflow}:${POSTGRES_PASSWORD:-trafficflow_secret}@postgres:5432/${POSTGRES_DB:-trafficflow}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_BASE_URL: http://backend:8000
      MODEL_PATH: /app/weights/${MODEL_FILE:-yolo11n.pt}
      CAMERAS_DIR: /app/configs/cameras
      DETECT_EVERY_N_FRAMES: ${DETECT_EVERY_N_FRAMES:-2}
      HALF_PRECISION: "false"
    volumes:
      - ../weights:/app/weights:ro
      - ../configs:/app/configs:ro
      - trafficflow_storage:/app/storage
      - trafficflow_outputs:/app/outputs
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    profiles: ["", "cpu"]

  # ── Model worker (GPU) ─────────────────────────────────────────────────────
  model-gpu:
    build:
      context: ..
      dockerfile: services/model/Dockerfile
      args:
        TORCH_INDEX_URL: ${TORCH_INDEX_URL:-https://download.pytorch.org/whl/cu128}
        TORCH_PACKAGES: ${TORCH_PACKAGES:-torch torchvision}
    container_name: trafficflow_model_gpu
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_BASE_URL: http://backend:8000
      MODEL_PATH: /app/weights/${MODEL_FILE:-yolo11n.pt}
      CAMERAS_DIR: /app/configs/cameras
      DETECT_EVERY_N_FRAMES: ${DETECT_EVERY_N_FRAMES:-2}
      HALF_PRECISION: "true"
    volumes:
      - ../weights:/app/weights:ro
      - ../configs:/app/configs:ro
      - trafficflow_storage:/app/storage
      - trafficflow_outputs:/app/outputs
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles: ["gpu"]

  # ── Frontend SPA ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ..
      dockerfile: services/frontend/Dockerfile
    container_name: trafficflow_frontend
    restart: unless-stopped
    environment:
      FRONTEND_PORT: 3000
      API_BASE_URL: ${API_BASE_URL:-/}
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: trafficflow_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  trafficflow_pgdata:
  trafficflow_outputs:
  trafficflow_storage:
  trafficflow_logs:
