    <div id="page-content-live" class="tab-content hidden space-y-6">
        <!-- Camera selector + AI status row -->
        <div class="flex flex-wrap items-center gap-4">
            <div class="flex items-center gap-3">
                <label class="text-xs font-semibold uppercase text-slate-500">Camera</label>
                <select id="live-cam-select" onchange="loadLiveCameraData()" class="bg-slate-900 border border-slate-800 rounded-lg px-3 py-2 text-slate-200 text-sm focus:outline-none focus:border-indigo-500">
                </select>
            </div>
            <!-- AI Metrics Pills -->
            <div class="flex gap-3 ml-auto">
                <div class="bg-slate-900 border border-slate-800 rounded-lg px-3 py-2 flex items-center gap-2">
                    <i data-lucide="zap" class="h-3.5 w-3.5 text-emerald-400"></i>
                    <span class="text-xs text-slate-400">FPS</span>
                    <span class="text-xs font-bold text-white" id="live-fps">28.4</span>
                </div>
                <div class="bg-slate-900 border border-slate-800 rounded-lg px-3 py-2 flex items-center gap-2">
                    <i data-lucide="clock" class="h-3.5 w-3.5 text-indigo-400"></i>
                    <span class="text-xs text-slate-400">Latency</span>
                    <span class="text-xs font-bold text-white" id="live-latency">35ms</span>
                </div>
                <div class="bg-slate-900 border border-slate-800 rounded-lg px-3 py-2 flex items-center gap-2">
                    <i data-lucide="cpu" class="h-3.5 w-3.5 text-amber-400"></i>
                    <span class="text-xs text-slate-400">GPU</span>
                    <span class="text-xs font-bold text-white" id="live-gpu">55%</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Video -->
            <div class="md:col-span-2 bg-slate-900/40 border border-slate-800 rounded-xl p-5 flex flex-col">
                <div class="flex justify-between items-center mb-3">
                    <h4 class="text-sm font-bold text-white">Annotated Video Playback</h4>
                    <div class="flex items-center gap-1.5">
                        <span class="pulse-dot w-2 h-2 rounded-full bg-rose-500 inline-block"></span>
                        <span class="text-xs text-slate-400">LIVE</span>
                    </div>
                </div>
                <div id="live-video-container" class="bg-slate-950 border border-slate-800 rounded-xl aspect-video w-full flex flex-col items-center justify-center text-center p-6 text-slate-500">
                    <i data-lucide="video-off" class="h-10 w-10 text-slate-700 mb-3"></i>
                    <p class="text-sm">Select a camera and run an inference job to view the annotated stream.</p>
                </div>
            </div>

            <!-- Right stats column -->
            <div class="space-y-4">
                <!-- Lane occupancy -->
                <div class="bg-slate-900/40 border border-slate-800 rounded-xl p-5">
                    <h4 class="text-sm font-bold text-white mb-3">Lane Occupancy</h4>
                    <div id="live-occupancy-list" class="space-y-2"></div>
                </div>

                <!-- Vehicle type breakdown -->
                <div class="bg-slate-900/40 border border-slate-800 rounded-xl p-5">
                    <h4 class="text-sm font-bold text-white mb-3">Vehicle Types (Session)</h4>
                    <div class="space-y-2">
                        <div class="flex items-center gap-2">
                            <span class="text-xs text-slate-400 w-20">Car</span>
                            <div class="flex-1 bg-slate-800 rounded-full h-1.5">
                                <div id="live-type-car-bar" class="bg-indigo-500 h-1.5 rounded-full" style="width:0%"></div>
                            </div>
                            <span class="text-xs font-bold text-white w-8 text-right" id="live-type-car">0</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-xs text-slate-400 w-20">Motorbike</span>
                            <div class="flex-1 bg-slate-800 rounded-full h-1.5">
                                <div id="live-type-moto-bar" class="bg-emerald-500 h-1.5 rounded-full" style="width:0%"></div>
                            </div>
                            <span class="text-xs font-bold text-white w-8 text-right" id="live-type-moto">0</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-xs text-slate-400 w-20">Truck</span>
                            <div class="flex-1 bg-slate-800 rounded-full h-1.5">
                                <div id="live-type-truck-bar" class="bg-amber-500 h-1.5 rounded-full" style="width:0%"></div>
                            </div>
                            <span class="text-xs font-bold text-white w-8 text-right" id="live-type-truck">0</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-xs text-slate-400 w-20">Bus</span>
                            <div class="flex-1 bg-slate-800 rounded-full h-1.5">
                                <div id="live-type-bus-bar" class="bg-rose-500 h-1.5 rounded-full" style="width:0%"></div>
                            </div>
                            <span class="text-xs font-bold text-white w-8 text-right" id="live-type-bus">0</span>
                        </div>
                    </div>
                </div>

                <!-- Lane changes -->
                <div class="bg-slate-900/40 border border-slate-800 rounded-xl p-5">
                    <h4 class="text-sm font-bold text-white mb-3">Recent Lane Changes</h4>
                    <table class="w-full text-xs text-left text-slate-400">
                        <thead class="text-slate-500 border-b border-slate-800">
                            <tr><th class="pb-2">ID</th><th class="pb-2">From</th><th class="pb-2">To</th><th class="pb-2">Frame</th></tr>
                        </thead>
                        <tbody id="live-lane-changes-tbody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
