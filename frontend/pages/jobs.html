    <div id="page-content-jobs" class="tab-content hidden space-y-6">

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
                <div>
                    <label class="block text-xs font-semibold uppercase text-slate-500 mb-2">Camera</label>
                    <select id="overview-cam-select" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-slate-200 text-sm focus:outline-none focus:border-indigo-500"></select>
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase text-slate-500 mb-2">Model</label>
                    <select id="overview-model-select" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-slate-200 text-sm focus:outline-none focus:border-indigo-500"></select>
                </div>
                <button onclick="launchJob()" class="flex items-center justify-center gap-2 px-5 py-2.5 rounded-lg text-sm font-semibold bg-indigo-600 hover:bg-indigo-500 text-white transition-all">
                    <i data-lucide="play" class="h-4 w-4"></i> Start Job

            </div>
        </div>
        <div id="job-detail-panel" class="hidden bg-slate-900/50 border border-indigo-500/20 rounded-xl p-6">

            <div id="job-detail-body" class="text-sm text-slate-300"></div>
        </div>
        <div class="bg-slate-900/40 border border-slate-800 rounded-xl p-6">
            <h3 class="text-base font-bold text-white mb-4">All Jobs</h3>

            <div class="overflow-x-auto">

                            <th class="px-4 py-3 font-semibold">Actions</th>
                        </tr>

                </table>
            </div>
        </div>
