    <div id="page-content-counting" class="tab-content hidden space-y-6">
        <div class="bg-slate-900/40 border border-slate-800 rounded-xl p-5">
            <h3 class="text-sm font-bold text-white mb-4">Filter</h3>
            <div class="grid grid-cols-2 md:grid-cols-6 gap-3 items-end">
                <div>
                    <label class="block text-xs text-slate-500 mb-1.5 font-semibold uppercase">Date</label>
                    <input id="count-filter-date" type="date" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-slate-200 text-sm focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-xs text-slate-500 mb-1.5 font-semibold uppercase">From</label>
                    <input id="count-filter-from" type="time" value="00:00" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-slate-200 text-sm focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-xs text-slate-500 mb-1.5 font-semibold uppercase">To</label>
                    <input id="count-filter-to" type="time" value="23:59" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-slate-200 text-sm focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-xs text-slate-500 mb-1.5 font-semibold uppercase">Camera</label>
                    <select id="count-filter-camera" onchange="applyCountingFilter()" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-slate-200 text-sm focus:outline-none focus:border-indigo-500">
                        <option value="">— Select camera —</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs text-slate-500 mb-1.5 font-semibold uppercase">Vehicle Type</label>
                    <select id="count-filter-type" onchange="applyCountingFilter()" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-slate-200 text-sm focus:outline-none focus:border-indigo-500">
                        <option value="">All types</option>
                        <option value="car">Car</option>
                        <option value="motorcycle">Motorcycle</option>
                        <option value="truck">Truck</option>
                        <option value="bus">Bus</option>
                    </select>
                </div>
                <button onclick="applyCountingFilter()" class="flex items-center justify-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold bg-indigo-600 hover:bg-indigo-500 text-white transition-all">
                    <i data-lucide="search" class="h-4 w-4"></i> Apply
                </button>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="counting-kpi-row">
            <div class="kpi-card border border-slate-800 rounded-xl p-4 text-center">
                <p class="text-xs text-slate-500 mb-1">Total</p>
                <p class="text-2xl font-extrabold text-white" id="count-total">—</p>
            </div>
            <div class="kpi-card border border-slate-800 rounded-xl p-4 text-center">
                <p class="text-xs text-slate-500 mb-1">Cars</p>
                <p class="text-2xl font-extrabold text-indigo-400" id="count-cars">—</p>
            </div>
            <div class="kpi-card border border-slate-800 rounded-xl p-4 text-center">
                <p class="text-xs text-slate-500 mb-1">Motorcycles</p>
                <p class="text-2xl font-extrabold text-emerald-400" id="count-motos">—</p>
            </div>
            <div class="kpi-card border border-slate-800 rounded-xl p-4 text-center">
                <p class="text-xs text-slate-500 mb-1">Trucks / Buses</p>
                <p class="text-2xl font-extrabold text-amber-400" id="count-heavy">—</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-1 bg-slate-900/40 border border-slate-800 rounded-xl p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-base font-bold text-white">Count by Lane</h3>
                    <button onclick="exportCountingCSV()" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-semibold border border-slate-700 bg-slate-900 hover:border-slate-600 text-slate-300" title="Export table as CSV">
                        <i data-lucide="download" class="h-3.5 w-3.5"></i> CSV
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm text-left text-slate-400">
                        <thead class="text-xs uppercase bg-slate-950/60 text-slate-500 border-b border-slate-800 sticky top-0">
                            <tr>
                                <th class="px-3 py-3 font-semibold">Lane</th>
                                <th class="px-3 py-3 font-semibold">Cars</th>
                                <th class="px-3 py-3 font-semibold">Motos</th>
                                <th class="px-3 py-3 font-semibold">Trucks</th>
                                <th class="px-3 py-3 font-semibold">Buses</th>
                                <th class="px-3 py-3 font-semibold">Total</th>
                            </tr>
                        </thead>
                        <tbody id="counting-table-body">
                            <tr><td colspan="6" class="px-3 py-8 text-center text-slate-600 text-sm">Select a camera to view lane counts</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="lg:col-span-2 bg-slate-900/40 border border-slate-800 rounded-xl p-6 overflow-hidden">
                <h4 class="text-base font-bold text-white mb-4">Volume by Lane</h4>
                <div id="chart-counting-lanes" class="w-full overflow-hidden relative"></div>
            </div>
        </div>
    </div>
